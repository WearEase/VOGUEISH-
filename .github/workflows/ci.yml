name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Assuming standard Next.js requirement
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Type Check
      run: npx tsc --noEmit

    - name: Build
      run: npm run build
      env:
        # Provide any necessary mock environment variables for the build to succeed if needed
        # MONGODB_URI: "mongodb://localhost:27017/mock"
        NEXT_PUBLIC_APP_URL: "http://localhost:3000"

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run E2E Tests
      run: npx playwright test
